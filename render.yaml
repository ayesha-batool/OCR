services:
  - type: web
    name: ocr-extractor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn process_images:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CORS_ORIGINS
        value: "http://localhost:4200,https://www.steamx.pk,https://steamx.pk,https://steamx-v1-backend.onrender.com,https://ocr-9e8w.onrender.com"
